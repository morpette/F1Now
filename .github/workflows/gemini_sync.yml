name: Sync Backlog to Repo
on:
  issues:
    types: [opened, edited, deleted, closed, reopened]
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  sync_issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessary to push the file back to your repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Export Issues to JSON
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # This command fetches all issues and overwrites backlog.json
          # It captures the number, title, body, labels, and current state
          gh issue list --state all --limit 1000 \
          --json number,title,body,labels,state,updatedAt \
          > backlog.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backlog.json
          # The 'exit 0' ensures the workflow doesn't fail if there are no changes to commit
          git commit -m "Automated backlog sync [skip ci]" || exit 0
          git push
